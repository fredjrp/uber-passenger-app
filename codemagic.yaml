workflows:
  android-uber-build:
    name: Uber Passenger Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.example.uberuser"
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Flutter Clean
        script: |
          rm -rf android/app/src/main/java/io/flutter/plugins/
          flutter clean
      - name: Build Android APK
        script: |
          flutter precache --android
          flutter pub get
          flutter build apk --release --build-name=1.0.${BUILD_NUMBER} --build-number=${BUILD_NUMBER} --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
