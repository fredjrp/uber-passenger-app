workflows:
  android-uber-build:
    name: Uber Passenger Android Build
    instance_type: mac_mini_m2 # High performance to save build minutes
    max_build_duration: 60
    environment:
      groups:
        - firebase_credentials # Create this in Codemagic UI for your google-services.json
        - map_tokens           # For your Mapbox/Google Maps keys
      vars:
        PACKAGE_NAME: "com.example.uberuser" # Double check your actual ID in build.gradle
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up Firebase Config
        script: | 
          # This pulls the JSON you'll upload to Codemagic environment variables
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: Flutter Clean
        script: |
          flutter clean
      - name: Build Android APK
        script: |
          flutter build apk --release --build-name=1.0.${BUILD_NUMBER} --build-number=${BUILD_NUMBER}
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
