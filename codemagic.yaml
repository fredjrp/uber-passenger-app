# Complete "Bulletproof" Codemagic configuration
workflows:
  android-uber-build:
    name: Uber Passenger Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - firebase_credentials # Ensure GOOGLE_SERVICES_JSON is in this group
      vars:
        PACKAGE_NAME: "com.fredjrp.uberpassenger"
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up Firebase Config
        script: | 
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Generate and Upgrade Gradle Wrapper
        script: |
          # Navigate to android folder and use system-wide gradle 
          # to create a fresh 8.4 wrapper if one is missing or old.
          cd android
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
      - name: Force Modern Dependencies
        script: |
          # Solves the 'intl' and 'null-safety' conflicts automatically
          flutter pub upgrade --major-versions
      - name: Flutter Clean
        script: |
          flutter clean
      - name: Build Android APK
        script: |
          # Build using modern standards (no flags needed)
          flutter build apk --release --build-name=1.0.${BUILD_NUMBER} --build-number=${BUILD_NUMBER}
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
