workflows:
  android-uber-build:
    name: Uber Passenger Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2 # High performance for heavy dependency projects
    environment:
      groups:
        - firebase_credentials # Set this up in Codemagic UI
      vars:
        PACKAGE_NAME: "com.fredjrp.uberpassenger"
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up Firebase Config
        script: | 
          # Decodes your base64 encoded google-services.json
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Install and Upgrade Dependencies
        script: |
          # Resolves version pinning conflicts automatically
          flutter pub upgrade --major-versions
      - name: Flutter Clean
        script: |
          flutter clean
      - name: Build Android APK
        script: |
          # The magic flag to support legacy packages like gen_lang
          flutter build apk --release --no-sound-null-safety --build-name=1.0.${BUILD_NUMBER} --build-number=${BUILD_NUMBER}
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - juniorokovagng@gmail.com # Change this to your email
        notifying:
          on_success: true
          on_failure: true
